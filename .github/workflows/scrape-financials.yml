name: Scrape Financials

on:
  schedule:
    - cron: '0 4 * * 0'   # every Sunday at 04:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-scrape existing rows (overwrites sa_data)'
        type: boolean
        default: false

jobs:
  annual:
    name: Annual (FY)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsx scripts/scrape-stockanalysis-annual.ts ${{ github.event.inputs.force == 'true' && '--force' || '' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  quarterly:
    name: Quarterly
    runs-on: ubuntu-latest
    needs: annual
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsx scripts/scrape-stockanalysis-quarterly.ts ${{ github.event.inputs.force == 'true' && '--force' || '' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
