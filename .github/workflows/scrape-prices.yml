name: Scrape Prices

on:
  schedule:
    - cron: '20 16 * * 1-5'  # weekdays at 16:20 UTC (ZSE closes at ~16:00 CET/15:00 UTC)
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Run in backfill mode (fetch 5 years, compare with DB)'
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run price scraper
        id: scraper
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            npx tsx scripts/scrape-zse-prices.ts --backfill 2>&1 | tee /tmp/prices-output.txt; exit ${PIPESTATUS[0]}
          else
            npx tsx scripts/scrape-zse-prices.ts 2>&1 | tee /tmp/prices-output.txt; exit ${PIPESTATUS[0]}
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Write job summary
        if: always()
        run: |
          echo "### Price Scraper $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "(OK|GREŠKA|KOREKCIJA|MISMATCH|BACKFILL|STATISTIKA|Upsertano|dana OK|\[)" /tmp/prices-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
