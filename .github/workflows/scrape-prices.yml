name: Scrape Prices

on:
  schedule:
    - cron: '20 16 * * 1-5'  # weekdays at 16:20 UTC (ZSE closes at ~16:00 CET/15:00 UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: daily (default), compare (diff SA vs DB, no writes), backfill (SA → DB, source of truth)'
        type: choice
        options:
          - daily
          - compare
          - backfill
        default: daily

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run price scraper
        id: scraper
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          if [ "$MODE" = "compare" ]; then
            npx tsx scripts/scrape-zse-prices.ts --compare 2>&1 | tee /tmp/prices-output.txt; exit ${PIPESTATUS[0]}
          elif [ "$MODE" = "backfill" ]; then
            npx tsx scripts/scrape-zse-prices.ts --backfill 2>&1 | tee /tmp/prices-output.txt; exit ${PIPESTATUS[0]}
          else
            npx tsx scripts/scrape-zse-prices.ts 2>&1 | tee /tmp/prices-output.txt; exit ${PIPESTATUS[0]}
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Write job summary
        if: always()
        run: |
          echo "### Price Scraper $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "(OK|GREŠKA|KOREKCIJA|MISMATCH|BACKFILL|COMPARE|STATISTIKA|USPOREDBA|ZNAČAJN|Upsertano|dana OK|točnih|zaokruži|\[)" /tmp/prices-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
